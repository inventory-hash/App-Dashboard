<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz46hQW9QxRqnVYUdLg3BrLzn7KAKTzUM10TqE3iYZWZ-NOeknNglkxV851YkRSakE5vg/exec";
let allData   = [];
// Use a predefined list of headers for consistency.
const PREDEFINED_HEADERS = [
  "Date",
  "Restaurant ID",
  "Restaurant/Kitchen Name",
  "Contact Number",
  "Status",
  "Agent Name"
];
// Define the exact statuses we want to see in the report.
const REPORT_STATUSES = [
  "Installed",
  "Installed But Not Use",
  "Not Installed"
];
// The headers for our new consolidated report table.
const REPORT_HEADERS = ["Agent Name", ...REPORT_STATUSES, "Grand Total"];
let headers   = PREDEFINED_HEADERS;
let filtered  = []; // For main table
let sortCol   = ""; // For main table
let sortAsc   = true; // For main table
let currentPage = 1; // For main table
const PAGE_SIZE = 20; // For main table
let editRowIndex = null;
let reportCurrentPage = 1; // For consolidated report
const REPORT_PAGE_SIZE = 15; // For consolidated report

// ── Bootstrap ─────────────────────────────────────────────
document.getElementById("setup-banner").classList.add("hidden");
const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
const now = new Date();
const currentMonthValue = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
document.getElementById("month-filter").value = currentMonthValue;
fetchData();

// ── Fetch ─────────────────────────────────────────────────

async function fetchData() {
  if (!API_URL) return;
  setLoading(true); // For main table
  try {
    const res  = await fetch(API_URL, { redirect: "follow" });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);

    // Ensure all rows have all predefined headers.
    allData = json.data.map(row => {
      const newRow = {};
      PREDEFINED_HEADERS.forEach(h => newRow[h] = row[h] ?? '');
      return newRow;
    });
    headers = PREDEFINED_HEADERS; // Ensure headers are always predefined

    buildColFilter(); // For main table
    applyFilter(); // For main table
    renderConsolidatedReport(); // For consolidated report

    document.getElementById("stat-rows").textContent = allData.length;
    document.getElementById("stat-cols").textContent = headers.length;
    document.getElementById("last-sync").textContent =
      "Synced " + new Date().toLocaleTimeString();
  } catch (e) {
    setError("Failed to fetch data: " + e.message); // For main table
  }
}

// ── Filter & Sort (Main Table) ──────────────────────────

function applyFilter() {
  const q   = document.getElementById("search-input").value.toLowerCase();
  const col = document.getElementById("col-filter").value;
  filtered = allData.filter(row => {
    const target = col ? String(row[col]) : Object.values(row).join(" ");
    return target.toLowerCase().includes(q);
  });
  if (sortCol) {
    filtered.sort((a, b) => {
      const va = a[sortCol], vb = b[sortCol];
      const cmp = isNaN(va) || isNaN(vb)
        ? String(va).localeCompare(String(vb))
        : Number(va) - Number(vb);
      return sortAsc ? cmp : -cmp;
    });
  }
  currentPage = 1;
  document.getElementById("stat-filtered").textContent = filtered.length;
  renderTable();
}

// ── Render (Main Table) ──────────────────────────────────

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filtered.slice(start, start + PAGE_SIZE);
  if (!headers.length) { setLoading(false); return; }
  const tableHTML = `
    <table>
      <thead><tr>
        <th style="width:40px">#</th>
        ${headers.map(h => `
          <th onclick="toggleSort('${h}')" class="${sortCol===h?'active':''}">
            ${esc(h)} <span class="sort-icon">${sortCol===h?(sortAsc?'▲':'▼'):'⇅'}</span>
          </th>`).join("")}
        <th>Actions</th>
      </tr></thead>
      <tbody>
        ${page.length ? page.map((row, i) => {
          const sheetRow = allData.indexOf(row) + 2; // +2 for header row
          return `<tr>
            <td class="row-num">${start + i + 1}</td>
            ${headers.map(h => `<td>${formatCell(row[h])}</td>`).join("")}
            <td>
              <div class="action-cell">
                <button class="icon-btn" onclick="openEditModal(${sheetRow})">✎ Edit</button>
                <button class="icon-btn del" onclick="deleteRow(${sheetRow})">✕</button>
              </div>
            </td>
          </tr>`;
        }).join("") : `<tr><td colspan="${headers.length + 2}" class="state-msg">No matching rows.</td></tr>`}
      </tbody>
    </table>`;
  document.getElementById("table-container").innerHTML = tableHTML;
  renderPagination();
  setLoading(false);
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const el    = document.getElementById("pagination");
  if (total <= 1) { el.innerHTML = ""; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
  for (let p = 1; p <= total; p++) {
    if (total > 7 && Math.abs(p - currentPage) > 2 && p !== 1 && p !== total) {
      if (p === 2 || p === total - 1) html += `<span style="color:var(--muted);padding:0 .25rem">…</span>`;
      continue;
    }
    html += `<button class="page-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>Next ›</button>`;
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; renderTable(); }

function toggleSort(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
  applyFilter();
}

// ── Consolidated Report ───────────────────────────────────

function onMonthChange() {
  reportCurrentPage = 1; // Reset to first page on month change
  renderConsolidatedReport();
}

function renderConsolidatedReport() {
  const monthValue = document.getElementById("month-filter").value;
  if (!monthValue) {
    document.getElementById("consolidated-table-container").innerHTML = `<div class="state-msg">Please select a month.</div>`;
    document.getElementById("report-pagination").innerHTML = "";
    return;
  }
  const [selectedYear, selectedMonth] = monthValue.split('-').map(Number);

  const monthData = allData.filter(row => {
    const rowDate = new Date(row.Date);
    return row.Date && rowDate.getFullYear() === selectedYear && rowDate.getMonth() === (selectedMonth - 1);
  });

  // document.getElementById("stat-filtered").textContent = monthData.length; // This stat card is for the main table now

  if (!monthData.length) {
    document.getElementById("consolidated-table-container").innerHTML =
      `<div class="state-msg">No data found for the selected month.</div>`;
    document.getElementById("report-title").textContent = `Agent-wise Report for ${monthNames[selectedMonth - 1]} ${selectedYear}`;
    document.getElementById("report-pagination").innerHTML = "";
    return;
  }

  const report = {};

  monthData.forEach(row => {
    const agent = row["Agent Name"] || "Unassigned";
    const status = row["Status"];

    if (!report[agent]) {
      // Initialize a new agent entry with all status counts at 0.
      report[agent] = { "Grand Total": 0 };
      REPORT_STATUSES.forEach(s => report[agent][s] = 0);
    }

    // If the row's status is one we're tracking, increment its count.
    if (REPORT_STATUSES.includes(status)) {
      report[agent][status]++;
    }
    // Always increment the grand total for the agent.
    report[agent]["Grand Total"]++;
  });

  const agentNames = Object.keys(report).sort();

  // --- Calculate Totals for all agents (not just the page) ---
  const totals = { "Grand Total": 0 };
  REPORT_STATUSES.forEach(s => totals[s] = 0);

  agentNames.forEach(agent => {
    totals["Grand Total"] += report[agent]["Grand Total"];
    REPORT_STATUSES.forEach(s => {
      totals[s] += report[agent][s];
    });
  });

  // --- Pagination Logic ---
  const start = (reportCurrentPage - 1) * REPORT_PAGE_SIZE;
  const pageAgentNames = agentNames.slice(start, start + REPORT_PAGE_SIZE);
  // --- End Pagination Logic ---
  document.getElementById("report-title").textContent = `Agent-wise Report for ${monthNames[selectedMonth - 1]} ${selectedYear}`;

  const tableHTML = `
    <table>
      <thead><tr>
        ${REPORT_HEADERS.map(h => `<th>${esc(h)}</th>`).join("")}
      </tr></thead>
      <tbody>
        ${pageAgentNames.length ? pageAgentNames.map(agent => `
          <tr>
            <td>${esc(agent)}</td>
            ${REPORT_STATUSES.map(s => `<td>${report[agent][s] || 0}</td>`).join("")}
            <td>${report[agent]["Grand Total"]}</td>
          </tr>
        `).join("") : `<tr><td colspan="${REPORT_HEADERS.length}" class="state-msg">No agents found for this period.</td></tr>`}
      </tbody>
      <tfoot>
        <tr>
          <td><strong>Total</strong></td>
          ${REPORT_STATUSES.map(s => `<td><strong>${totals[s]}</strong></td>`).join("")}
          <td><strong>${totals["Grand Total"]}</strong></td>
        </tr>
      </tfoot>
    </table>`;
  document.getElementById("consolidated-table-container").innerHTML = tableHTML;
  renderReportPagination(agentNames.length);
}

function renderReportPagination(totalItems) {
  const total = Math.ceil(totalItems / REPORT_PAGE_SIZE);
  const el    = document.getElementById("report-pagination");
  if (total <= 1) { el.innerHTML = ""; return; }
  let html = `<button class="page-btn" onclick="goReportPage(${reportCurrentPage-1})" ${reportCurrentPage===1?'disabled':''}>‹ Prev</button>`;
  for (let p = 1; p <= total; p++) {
    if (total > 7 && Math.abs(p - reportCurrentPage) > 2 && p !== 1 && p !== total) {
      if (p === 2 || p === total - 1) html += `<span style="color:var(--muted);padding:0 .25rem">…</span>`;
      continue;
    }
    html += `<button class="page-btn${p===reportCurrentPage?' active':''}" onclick="goReportPage(${p})">${p}</button>`;
  }
  html += `<button class="page-btn" onclick="goReportPage(${reportCurrentPage+1})" ${reportCurrentPage===total?'disabled':''}>Next ›</button>`;
  el.innerHTML = html;
}

function goReportPage(p) {
  reportCurrentPage = p;
  renderConsolidatedReport();
}

// ── Modal ─────────────────────────────────────────────────

function openAddModal() {
  editRowIndex = null;
  document.getElementById("modal-title").textContent = "Add Row";
  document.getElementById("modal-save-btn").textContent = "Add";
  buildForm({}); // Reverted to generic form
  document.getElementById("modal-overlay").classList.add("open");
}

function openEditModal(sheetRow) {
  editRowIndex = sheetRow;
  const rowData = allData[sheetRow - 2]; // sheetRow 2 = allData[0]
  document.getElementById("modal-title").textContent = "Edit Row " + sheetRow;
  document.getElementById("modal-save-btn").textContent = "Update";
  buildForm(rowData || {});
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

function buildForm(data) {
  document.getElementById("modal-form").innerHTML = headers.map(h => `
    <div class="form-row">
      <label>${esc(h)}</label>
      <input id="field-${esc(h)}" value="${esc(String(data[h] ?? ''))}" placeholder="${esc(h)}" />
    </div>`).join("");
}

async function saveModal() {
  const data = {};
  headers.forEach(h => {
    data[h] = document.getElementById("field-" + h).value;
  });
  const action  = editRowIndex ? "update" : "append";
  const payload = editRowIndex
    ? { action, rowIndex: editRowIndex, data }
    : { action, data };
  try {
    const res  = await fetch(API_URL, {
      method: "POST", redirect: "follow",
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    toast(json.message, "ok");
    closeModal();
    await fetchData(); // Refresh both tables
  } catch (e) { toast("Error: " + e.message, "err"); }
}

// ── Delete (Main Table) ───────────────────────────────────

async function deleteRow(sheetRow) {
  if (!confirm(`Delete row ${sheetRow} from the sheet?`)) return;
  try {
    const res  = await fetch(API_URL, {
      method: "POST", redirect: "follow",
      body: JSON.stringify({ action: "delete", rowIndex: sheetRow })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    toast(json.message, "ok");
    await fetchData(); // Refresh both tables
  } catch (e) { toast("Error: " + e.message, "err"); }
}

// ── CSV Export (Main Table) ───────────────────────────────

function exportCSV() {
  if (!headers.length) return;
  const rows = [headers, ...filtered.map(r => headers.map(h => `"${String(r[h]).replace(/"/g,'""')}"`))]
    .map(r => r.join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([rows], {type:"text/csv"}));
  a.download = "app-data-" + Date.now() + ".csv";
  a.click();
}

// ── Helpers ───────────────────────────────────────────────

function buildColFilter() {
  const sel = document.getElementById("col-filter");
  sel.innerHTML = `<option value="">All columns</option>` +
    headers.map(h => `<option value="${esc(h)}">${esc(h)}</option>`).join("");
}

function formatCell(val) {
  if (val === "" || val == null) return `<span style="color:var(--muted)">—</span>`;
  if (!isNaN(val) && val !== "") return `<span style="font-family:var(--mono)">${Number(val).toLocaleString()}</span>`;
  const s = String(val);
  if (s.startsWith("http")) return `<a href="${s}" target="_blank" style="color:var(--accent)">${s.length>40?s.slice(0,40)+'…':s}</a>`;
  return esc(s);
}

function getTodayDate() {
  const d = new Date();
  return d.toISOString().split('T')[0]; // YYYY-MM-DD
}

function setLoading(on) {
  if (!on) return;
  document.getElementById("table-container").innerHTML =
    `<div class="state-msg"><div class="spinner"></div>Loading…</div>`;
}

function setError(msg) {
  document.getElementById("table-container").innerHTML =
    `<div class="state-msg" style="color:var(--danger)">${msg}</div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show " + (type || "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = "", 3000);
}

// Close modal on overlay click
document.getElementById("modal-overlay").addEventListener("click", e => {
  // Close modal only if the dark overlay itself is clicked, not the modal content.
  if (e.target === e.currentTarget) closeModal();
});

/* Add/Edit Modal (moved to bottom for better organization) */
document.write(`
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Add Row</h2>
    <div id="modal-form"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">Cancel</button>
      <button class="btn" id="modal-save-btn" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>
`);
</script>
</body>
</html>
